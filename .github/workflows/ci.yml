# ─────────────────────────────────────────────────────────────────────────────
# CI Workflow — SURSO Frontend
# ─────────────────────────────────────────────────────────────────────────────
#
# PURPOSE:
#   Automatically validates every push and Pull Request to ensure:
#     1. The frontend builds successfully for production (via Vite)
#     2. The Playwright E2E suite passes against a live backend
#
# JOBS:
#   • frontend-check → install deps, lint, run `npm run build`
#   • e2e-tests       → checks out SURSO-backend too, boots both servers,
#                        runs the Playwright suite against them
#
# NOTE: e2e-tests depends on the sibling SURSO-backend repo. It checks it out
# via actions/checkout's `repository:` input — this works without extra auth
# because both repos are public.
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI — SURSO Frontend

on:
  # ── Trigger on every push, to any branch ──────────────────────────────────
  push:

  # ── Trigger on all Pull Requests targeting main ───────────────────────────
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# ── Cancel any in-progress run for the same branch/PR when a new one starts ─
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB: Frontend Production Build
  #
  # Verifies that the React + Vite frontend builds successfully for production.
  # Also runs ESLint (the frontend already has eslint configured).
  # ───────────────────────────────────────────────────────────────────────────
  frontend-check:
    name: "⚡ Frontend — Lint & Build (Vite)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      # ── Run ESLint on the frontend ────────────────────────────────────────
      - name: Run ESLint
        run: npm run lint

      # ── Build frontend for production ─────────────────────────────────────
      - name: Build frontend for production
        run: npm run build
        env:
          VITE_API_URL: ""

      # ── Report build output size (informational — never blocks the PR) ───
      - name: Report build output size
        if: success()
        shell: bash
        run: |
          echo ""
          echo "📦 Production build output:"
          echo "──────────────────────────"
          du -sh dist/
          echo ""
          echo "Largest JS chunks:"
          find dist/assets -name "*.js" -exec du -sh {} \; 2>/dev/null | sort -rh | head -5
          echo ""

  # ───────────────────────────────────────────────────────────────────────────
  # JOB: Playwright E2E Tests
  #
  # Boots a real backend (checked out from SURSO-backend) and this frontend,
  # then runs the Playwright suite against both.
  # ───────────────────────────────────────────────────────────────────────────
  e2e-tests:
    timeout-minutes: 10
    name: "🎭 Playwright E2E Tests"
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: Giannossk/SURSO-backend
          path: backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend server
        working-directory: backend
        run: |
          echo "Starting backend in background..."
          mkdir -p ../ci-logs

          # Start with verbose logging
          JWT_SECRET="test-secret-key-for-ci" \
          MONGO_URI="mongodb://127.0.0.1:27017/event_mgmt_test" \
          PORT=5050 \
          NODE_ENV=test \
          npm start > ../ci-logs/backend.log 2>&1 &

          BACKEND_PID=$!
          echo $BACKEND_PID > ../ci-logs/backend.pid

          # Give server time to start
          sleep 3

          # Check if process is still running
          if ! kill -0 $BACKEND_PID 2>/dev/null; then
            echo "❌ Backend process died immediately"
            echo "--- Backend logs ---"
            cat ../ci-logs/backend.log || echo "No logs found"
            exit 1
          fi
          echo "✅ Backend process started (PID: $BACKEND_PID)"

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -s http://localhost:5050/api/events > /dev/null 2>&1; then
              echo "✅ Backend server is ready!"
              exit 0
            fi
            echo "⏳ Waiting for backend... ($i/60)"
            sleep 2
          done
          echo "❌ Backend server failed to start"
          echo ""
          echo "--- Backend logs ---"
          cat ci-logs/backend.log 2>/dev/null || echo "No logs found"
          exit 1

      - name: Start frontend dev server
        run: |
          echo "Starting frontend dev server..."
          mkdir -p ci-logs
          npm run dev > ci-logs/frontend.log 2>&1 &
          echo $! > ci-logs/frontend.pid

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend server is ready!"
              exit 0
            fi
            echo "⏳ Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "❌ Frontend server failed to start"
          echo ""
          echo "--- Frontend logs ---"
          cat ci-logs/frontend.log 2>/dev/null || echo "No logs found"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          CLIENT_URL: "http://localhost:5173"
          API_URL: "http://localhost:5050"
          CI: "true"
